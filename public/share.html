<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Shared Stream</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #000; }
    .shell {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      cursor: default;
    }
    .shell.controls-hidden { cursor: none; }
    .shell.controls-hidden .controls { opacity: 0; pointer-events: none; }
    video {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
      object-fit: contain;
    }
    .offline {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      font-family: system-ui, sans-serif;
      font-size: 18px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      z-index: 3;
    }
    .offline.hidden { display: none; }
    .controls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px calc(14px + env(safe-area-inset-bottom, 0px));
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.75));
      transition: opacity 0.2s ease;
      font-family: system-ui, sans-serif;
    }
    .controls button,
    .controls input[type="range"] {
      appearance: none;
      border: 0;
      background: transparent;
      color: #fff;
      padding: 0;
      margin: 0;
    }
    .controls button {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .controls button:hover { background: rgba(255, 255, 255, 0.12); }
    .controls svg { width: 22px; height: 22px; fill: currentColor; }
    .spacer { flex: 1; }
    .volume {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .volume input[type="range"] {
      width: 88px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.35);
      outline: none;
      cursor: pointer;
    }
    .volume input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
    }
    .btn-live {
      height: 32px;
      padding: 0 12px;
      width: auto;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
      background: rgba(220, 38, 38, 0.95);
      display: none;
    }
    .btn-live.visible { display: inline-flex; }
    .btn-live:hover { background: #ef4444; }
    .icon-pause { display: none; }
    .playing .icon-play { display: none; }
    .playing .icon-pause { display: block; }
    .muted .icon-vol { display: none; }
    .muted .icon-muted { display: block; }
    .icon-muted { display: none; }
  </style>
</head>

<body>
  <div class="shell" id="shell">
    <video id="video" autoplay playsinline></video>
    <div class="offline" id="offline">Offline</div>
    <div class="controls" id="controls">
      <button type="button" id="btn-play" title="Play / Pause" aria-label="Play or pause">
        <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg class="icon-pause" viewBox="0 0 24 24"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
      </button>
      <div class="volume" id="volume-wrap">
        <button type="button" id="btn-mute" title="Mute" aria-label="Mute">
          <svg class="icon-vol" viewBox="0 0 24 24"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2c0-1.77-1-3.29-2.5-4.03v8.05c1.5-.74 2.5-2.26 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
          <svg class="icon-muted" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v4h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
        </button>
        <input id="volume" type="range" min="0" max="100" value="100" aria-label="Volume">
      </div>
      <div class="spacer"></div>
      <button type="button" class="btn-live" id="btn-live" title="Jump to live">Live</button>
      <button type="button" id="btn-fs" title="Fullscreen" aria-label="Fullscreen">
        <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      </button>
    </div>
  </div>
  <script src="js/share.js"></script>
</body>

</html>
